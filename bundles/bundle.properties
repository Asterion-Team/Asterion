planet.as-01-ascetion.name = 01 - «Ascension»
planet.as-asterion.name = Asterion

 #Sectors
sector.as-entry-point.name = Entry Point
sector.as-entry-point.description = Your landing site on this planet. The activity of the local factions is relatively low here, but there is definitely something alive here.
sector.as-impact-point.name = Impact Point
sector.as-impact-point.description = An intermediate sector. You won't discover any new technologies here, but you will encounter your future enemy for the first time.
sector.as-quartz-valley.name = Quartz Valley
sector.as-quartz-valley.description = This sector has a huge amount of quartz. Also, an outpost of the [#d0d8e8]Orion[] faction has been discovered in this sector.
sector.as-gorge.name = Gorge
sector.as-gorge.description = An outpost of [#c75432]Pyro[] is located in this sector. Research the basic technologies of the [#d0d8e8]Orion[] faction to capture this sector.
sector.as-coast.name = Coast
sector.as-coast.description = A coastal sector next to one of the kryoline lakes. Here you will gain access to liquid extraction and storage technologies, however activity of two factions has been noticed simultaneously, though they will land from the same point.

