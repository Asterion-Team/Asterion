#Factions
block.as-faction-resemblance.name = Faction - [#6c87fd]«Resemblance»[]
block.as-faction-resemblance.description = Your faction, your history on this planet.
block.as-faction-orion.name = Faction - [#d0d8e8]«Orion»[]
block.as-faction-orion.description = The oldest faction after the [#fcf3cf]Precursors[], using plasma and stellar energy as their main weapon. After the fall of the [#fcf3cf]Precursors[], it is the most powerful faction on Asterion.
block.as-faction-pyro.name = Faction - [#c75432]«Pyro»[]
block.as-faction-pyro.description = A faction that has adopted fire as its main combat principle. The face of the beginning of the war.
block.as-faction-extinguished.name = Faction - [#d26e64]«Extinguished»[]
block.as-faction-extinguished.description = A faction almost erased from the face of Asterion. As a result of a lightning strike by two hostile factions, it was the first to be broken in the great war. Your potential ally.
block.as-faction-techno.name = Faction - [#74c1e8]«Techno»[]
block.as-faction-techno.description = The most passive, but technologically advanced faction. The very first faction to discover zero-point energy and the principle of teleportation of small objects.
#Items
item.as-whitorite.name = Whitorite
item.as-whitorite.description = An extremely common and essential mineral on Asterion. Involved in almost all buildings.
item.as-pyrite.name = Pyrite
item.as-pyrite.description = The second most common resource, but not second in necessity. Most often needed for electrical buildings, but can be used as slowing ammunition.
item.as-quartz.name = Quartz
item.as-quartz.description = A crystalline formation based on silicon. Not used by itself anywhere, but often needed as raw material for producing other resources.
item.as-irmenite.name = Irmenite
item.as-irmenite.description = A silicon formation with an unusually strong structure, making this material ideal for complex buildings and piercing ammunition.
item.as-ashotite.name = Ashotite
item.as-ashotite.description = A formation based on methane and calcium obtained from ash in the atmosphere. It has an extremely high specific heat of combustion, making this resource useful for generators, explosive and fragmentation ammunition.
item.as-zincum.name = Zincum
item.as-zincum.description = Used primarily in production blocks as anti-corrosion protection. Not strong by itself, easily fusible.
item.as-magnetite.name = Magnetite
item.as-magnetite.description = Used in advanced buildings. Has a natural magnetic field; when used as ammunition, causes a short EMP (electromagnetic pulse) effect.

#Liquids
liquid.as-methane.name = Methane
liquid.as-methane.description = A flammable gas. Used as fuel in some generators and as raw material for producing other resources.
liquid.as-kryoline.name = Kryoline
liquid.as-kryoline.description = A cold, caustic liquid. Used as a stimulant in reactions for resource production.
liquid.as-kryoline.details = After the use of some "doomsday" weapon, all the seas on Asterion turned into this caustic mixture of acids and alkalis.

#Blocks
 #Blocks
block.as-core-force.name = Core: «Force»
block.as-core-force.description = Your heart of influence in every sector. When it is destroyed, your connection and influence in the sector is completely lost.
block.as-core-impact.name = Core: «Impact»
block.as-core-impact.description = Stores more items and is better protected. Similar to the previous one - when destroyed, your connection and influence in the sector is completely lost.
block.as-core-pressure.name = Core: «Pressure»
block.as-core-pressure.description = Stores more items and is better protected. Similar to the previous ones - when destroyed, your connection and influence in the sector is completely lost.

 #Logistics blocks
block.as-whitorite-duct.name = Whitorite Duct
block.as-whitorite-duct.description = Moves items forward.
block.as-whitorite-router.name = Whitorite Router
block.as-whitorite-router.description = Distributes items in 3 directions.
block.as-whitorite-junction.name = Whitorite Junction
block.as-whitorite-junction.description = Allows two perpendicular item flows to cross without mixing.
block.as-whitorite-duct-bridge.name = Whitorite Duct Bridge
block.as-whitorite-duct-bridge.description = Allows items to cross an impassable surface.
block.as-whitorite-sorter.name = Whitorite Sorter
block.as-whitorite-sorter.description = Passes the selected item straight, others to the sides.
block.as-whitorite-inverted-sorter.name = Whitorite Inverted Sorter
block.as-whitorite-inverted-sorter.description = Passes the selected item to the sides, others forward.
block.as-whitorite-gateway.name = Whitorite Overflow Gate
block.as-whitorite-gateway.description = Passes items forward as priority, if the output is blocked, passes items to the sides.
block.as-whitorite-inverted-gateway.name = Whitorite Overflow Gateway
block.as-whitorite-inverted-gateway.description = Passes items to the sides as priority, if the output is blocked, passes items forward.
block.as-whitorite-container.name = Whitorite Container
block.as-whitorite-container.description = Stores items, can be unloaded by an unloader if necessary. When placed next to the core, expands its storage.
block.as-whitorite-unloader.name = Whitorite Unloader
block.as-whitorite-unloader.description = Unloads items from adjacent buildings. Can distribute items between factories or unload items from storage blocks, as well as the core.
block.as-magnetite-conveyor.name = Magnetite Conveyor
block.as-magnetite-conveyor.description = Moves items in batches and unloads them in three directions at the end.

 #Liquid logistics blocks
block.as-irmenite-conduit.name = Irmenite Conduit
block.as-irmenite-conduit.description = Moves liquids forward.
block.as-irmenite-router.name = Irmenite Router
block.as-irmenite-router.description = Distributes the liquid flow.
block.as-irmenite-junction.name = Irmenite Junction
block.as-irmenite-junction.description = Allows two perpendicular liquid flows to cross without mixing.
block.as-irmenite-bridge.name = Irmenite Bridge
block.as-irmenite-bridge.description = Allows liquids to cross an impassable surface.
block.as-irmenite-pump.name = Irmenite Pump
block.as-irmenite-pump.description = Just a pump. Pumps liquids.
block.as-irmenite-tank.name = Irmenite Tank
block.as-irmenite-tank.description = Stores liquids.

 #Mining blocks
block.as-impulse-drill.name = Impulse Drill
block.as-impulse-drill.description = Drills with batches of items at a constant interval.
block.as-methane-extractor.name = Methane Extractor
block.as-methane-extractor.description = Extracts methane from vents.
block.as-magnetite-deep-drill.name = Magnetite Deep Drill
block.as-magnetite-deep-drill.description = Drills magnetite from underground clusters. Methane and kryoline are required to maintain the drilling process.

 #Production blocks
block.as-irmenite-oven.name = Irmenite Oven
block.as-irmenite-oven.description = Restores irmenite from quartz using whitorite.
block.as-irmenite-oven.details = Key to the technologies of the [#d0d8e8]Orion[] faction.
block.as-ashotite-press.name = Ashotite Press
block.as-ashotite-press.description = Compresses ash from the atmosphere together with methane and quartz to produce ashotite.

 #Power blocks
block.as-vent-burner.name = Vent Burner
block.as-vent-burner.description = Collects and burns all methane obtained from vents, thereby generating energy.
block.as-whitorite-beam-node.name = Whitorite Beam Node
block.as-whitorite-beam-node.description = Distributes energy.

 #Unit factories
  #Orion
block.as-orion-factory.name = Orion Factory
block.as-orion-factory.description = Creates the unit of the [#d0d8e8]«Orion»[] faction - the "Varan".
  #Pyro
block.as-pyro-factory.name = Pyro Factory
block.as-pyro-factory.description = Creates the unit of the [#c75432]«Pyro»[] faction - the "Spark".

 #Walls
block.as-whitorite-wall.name = Whitorite Wall
block.as-whitorite-wall.description = Protects buildings from enemy projectiles.
block.as-whitorite-wall-large.name = Large Whitorite Wall
block.as-whitorite-wall-large.description = Protects buildings from enemy projectiles.
block.as-irmenite-wall.name = Irmenite Wall
block.as-irmenite-wall.description = Protects buildings from enemy projectiles, blocks passing lasers.
block.as-irmenite-wall-large.name = Large Irmenite Wall
block.as-irmenite-wall-large.description = Protects buildings from enemy projectiles, blocks passing lasers.

 #Turrets
block.as-splinter.name = Splinter
block.as-splinter.description = Shoots fast-flying piercing spears.
block.as-decay.name = Decay
block.as-decay.description = Shoots a slowing and piercing needle.
block.as-breakthrough.name = Breakthrough
block.as-breakthrough.description = Shoots a continuously accelerating stream of heavy shells. After idle time, the acceleration decreases over time.
block.as-ignition.name = Ignition
block.as-ignition.description = Shoots a cluster of incendiary substance that acts like a thermite mixture upon hitting an enemy.

block.as-destroyer.name = Destroyer
block.as-destroyer.description = Ancient weapon of the [#fcf3cf]Precursor[] faction. Shoots a laser of pure antimatter, capable of destroying even the [#fcf3cf]Zodiac.[]

#Units
unit.as-varan.name = Varan
unit.as-varan.description = A simple mech of the [#d0d8e8]«Orion»[] faction. Fires small plasma bursts.
unit.as-piranha.name = Piranha
unit.as-piranha.description = Mech of the [#d0d8e8]«Orion»[] faction. Emits draining beams with a vampirism effect.
unit.as-vulture.name = Vulture
unit.as-vulture.description = Mech of the [#d0d8e8]«Orion»[] faction. Fires bursts consisting of plasma bundles.

