block.as-orion-factory.description = Создает юнита фракции [#d0d8e8]«Орион»[] - «Варана».
  #Пиро
block.as-pyro-factory.name = Фабрика пиро
block.as-pyro-factory.description = Создает юнита фракции [#c75432]«Пиро»[] - «Искру».

 #Стены
block.as-whitorite-wall.name = Белоритовая стена
block.as-whitorite-wall.description = Защищает постройки от снарядов противника.
block.as-whitorite-wall-large.name = Большая белоритовая стена
block.as-whitorite-wall-large.description = Защищает постройки от снарядов противника.
block.as-irmenite-wall.name = Ирменитовая стена
block.as-irmenite-wall.description = Защищает постройки от снарядов противника, блокирует проходящие лазеры.
block.as-irmenite-wall-large.name = Большая ирменитовая стена
block.as-irmenite-wall-large.description = Защищает постройки от снарядов противника, блокирует проходящие лазеры.

 #Турели
block.as-splinter.name = Заноза
block.as-splinter.description = Стреляет быстролетящими прошивающими копьями.
block.as-decay.name = Разложение
block.as-decay.description = Стреляет замедляющей и прошивающей иглой.
block.as-breakthrough.name = Прорыв
block.as-breakthrough.description = Стреляет непрерывно ускоряющимся потоком тяжёлых снарядов. После простоя ускорение со временем спадает.
block.as-ignition.name = Воспламенение
block.as-ignition.description = Стреляет кластером зажигающего вещества, которое при попадании в противника действует как термитная смесь.
block.as-glare.name = Блик
block.as-glare.description = Выпускает прожигающее пламя, которое плавит противников.
block.as-spark.name = Искра
block.as-spark.description = Выпускает шаровую молнию, которая поражает все в небольшом радиусе.

block.as-typhoon.name = Тайфун
block.as-typhoon.description = Большая спаренная турель. Стреляет массивными фугасными снарядами. Может менять режимы стрельбы.

block.as-destroyer.name = Уничтожение
block.as-destroyer.description = Древнее оружие фракции [#fcf3cf]предтечий.[] Стреляет лазером чистой антиматерии, способной уничтожить даже [#fcf3cf]Зодиака.[]

