unit.as-attraction.description = Юнит ядра «Сила». Ваша основная подконтрольная единица. Маневрена. Стреляет восстанавливающими пучками энергии.
unit.as-magnetism.name = Магнетизм
unit.as-magnetism.description = Юнит ядра «Влияние». Ваша основная подконтрольная единица. Маневрена. Стреляет очередями из небольших звезд.


