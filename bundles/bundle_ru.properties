#Блоки
 #Блоки 
 block.as-core-force.name = Ядро: «Сила»
 block.as-core-force.description = Ваше сердце влияния на каждом секторе. При его уничтожении, ваша связь и влияние на секторе полностью теряется.
 block.as-core-impact.name = Ядро: «Влияние»
 block.as-core-impact.description = Хранит больше предметов и защищено сильнее. По аналогии с предыдущим - при его уничтожении, ваша связь и влияние на секторе полностью теряется.
 block.as-core-pressure.name = Ядро: «Давление»
 block.as-core-pressure.description = Хранит больше предметов и защищено сильнее. По аналогии с предыдущими - при его уничтожении, ваша связь и влияние на секторе полностью теряется.

 #Блоки логистики
 block.as-whitorite-duct.name = Белоритовый канал
 block.as-whitorite-duct.description = Перемещает предметы вперед.
 block.as-whitorite-router.name = Белоритовый распределитель
 block.as-whitorite-router.description = Распределяет предметы в 3-х направлениях.
 block.as-whitorite-junction.name = Белоритовый перекресток
 block.as-whitorite-junction.description = Позволяет перекрещиваться двум перпендикулярным потокам предметов, без перемешивания тех.
 block.as-whitorite-duct-bridge.name = Белоритовый канальный мост
 block.as-whitorite-duct-bridge.description = Позволяет предметам пересекать непроходимую поверхность.
 block.as-whitorite-sorter.name = Белоритовый сортировщик
 block.as-whitorite-sorter.description = Пропускает выбранный предмет прямо, остальные по бокам.
 block.as-whitorite-inverted-sorter.name = Белоритовый инвертированный сортировщик
 block.as-whitorite-inverted-sorter.description = Пропускает выбранный предмет по бокам, остальные вперед.
 block.as-whitorite-gateway.name = Белоритовый избыточный затвор
 block.as-whitorite-gateway.description = Пропускает предметы приоритетно вперед, если выход перекрыт, пропускает предметы по бокам.
