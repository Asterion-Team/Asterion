#Фракции
block.as-faction-resemblance.name = Фракция - [#6c87fd]«Восставшие»[]
block.as-faction-resemblance.description = Ваша фракция, ваша история на этой планете.
block.as-faction-orion.name = Фракция - [#d0d8e8]«Орион»[]
block.as-faction-orion.description = Самая древняя фракция после [#fcf3cf]предтечий[], использующая плазму и энергию звезд, как свое главное оружие. После развала [#fcf3cf]предтечий[] является самой могущественной фракцией на Астерионе.
block.as-faction-pyro.name = Фракция - [#c75432]«Пиро»[]
block.as-faction-pyro.description = Фракция, взявшая за свой главный принцип ведения боя огонь. Лицо начала войны.
block.as-faction-extinguished.name = Фракция - [#d26e64]«Угасшие»[]
block.as-faction-extinguished.description = Фракция, почти стертая с лица Астериона. В следствие молниеносного удара двух враждебных фракций, была первой сломлена в великой войне. Ваш потенциальный союзник.
block.as-faction-techno.name = Фракция - [#74c1e8]«Техно»[]
block.as-faction-techno.description = Самая пассивная, но технологически развитая фракция. Самая первая фракция, открывшая энергию нулевой точки и принцип телепортации небольших объектов.
#Предметы
item.as-whitorite.name = Белорит
item.as-whitorite.description = Крайне распространённый и необходимый минерал на Астерионе. Участвует практически во всех строениях.
item.as-pyrite.name = Пирит
item.as-pyrite.description = Второй по распространённости, но не по необходимости, ресурс. Чаще всего нужен для электрических строений, однако может использоваться как замедляющий боеприпас.
item.as-quartz.name = Кварц
item.as-quartz.description = Кристаллическое образование на основе кремния. Сам по себе нигде не используется, однако часто нужен как сырьё для производства других ресурсов.
item.as-irmenite.name = Ирменит
item.as-irmenite.description = Образование кремния, имеющее необычно прочную структуру, что делает этот материал идеальным для сложных строений и пронзающих боеприпасов.
item.as-ashotite.name = Пеплотит
item.as-ashotite.description = Образование на основе метана и кальция, полученного из пепла в атмосфере. Имеет крайне высокую удельную теплоту сгорания, что делает этот ресурс полезным для генераторов, подрывных и осколочных боеприпасов.
item.as-zincum.name = Цинк
item.as-zincum.description = Используется преимущественно в блоках производства как антикоррозийная защита. Сам по себе непрочен, легкоплавок.
item.as-magnetite.name = Магнетит
item.as-magnetite.description = Используется в продвинутых строениях. Имеет естественное магнитное поле, при использовании как боеприпас вызывает кратковременный ЭМП (электромагнитная перегрузка) эффект.
item.as-zionitium.name = Зионит
item.as-zionitium.description = Композит на основе зиона. Не сильно прочный, однако очень тугоплавкий и теплопроводный.
item.as-zionitium.details = Теплопроводность в данном случае является плохой чертой данного материала, поэтому его не стоит использовать в обшивке, которая в дальнейшем будет испытывать слишком высокие температуры.
item.as-blacktite.name = Чернит
item.as-blacktite.description = Углеродный композит. Довольно прочный, легкий, однако не сильно защищен от перепадов температур. Обширно используется в продвинутых строениях любой фракции.

#Жидкости
liquid.as-methane.name = Метан
liquid.as-methane.description = Воспламеняемый газ. Используется как топливо в некоторых генераторах и как сырьё для получения других ресурсов.
liquid.as-kryoline.name = Криолин
liquid.as-kryoline.description = Холодная едкая жидкость. Используется как стимулятор в реакциях для производства ресурсов.
liquid.as-kryoline.details = После использования некого оружия «судного дня» все моря на Астерионе превратились в эту едкую смесь кислот и щелочей.

#Блоки
 #Блоки 
block.as-core-force.name = Ядро: «Сила»
block.as-core-force.description = Ваше сердце влияния на каждом секторе. При его уничтожении ваша связь и влияние на секторе полностью теряется.
block.as-core-impact.name = Ядро: «Влияние»
block.as-core-impact.description = Хранит больше предметов и защищено сильнее. По аналогии с предыдущим - при его уничтожении ваша связь и влияние на секторе полностью теряется.
block.as-core-pressure.name = Ядро: «Давление»
block.as-core-pressure.description = Хранит больше предметов и защищено сильнее. По аналогии с предыдущими - при его уничтожении ваша связь и влияние на секторе полностью теряется.

 #Блоки логистики
block.as-whitorite-duct.name = Белоритовый канал
block.as-whitorite-duct.description = Перемещает предметы вперёд.
block.as-whitorite-router.name = Белоритовый распределитель
block.as-whitorite-router.description = Распределяет предметы в 3 направлениях.
block.as-whitorite-junction.name = Белоритовый перекрёсток
block.as-whitorite-junction.description = Позволяет перекрещиваться двум перпендикулярным потокам предметов без их перемешивания.
block.as-whitorite-duct-bridge.name = Белоритовый канальный мост
block.as-whitorite-duct-bridge.description = Позволяет предметам пересекать непроходимую поверхность.
block.as-whitorite-sorter.name = Белоритовый сортировщик
block.as-whitorite-sorter.description = Пропускает выбранный предмет прямо, остальные — по бокам.
block.as-whitorite-inverted-sorter.name = Белоритовый инвертированный сортировщик
block.as-whitorite-inverted-sorter.description = Пропускает выбранный предмет по бокам, остальные — вперёд.
block.as-whitorite-gateway.name = Белоритовый избыточный затвор
block.as-whitorite-gateway.description = Пропускает предметы приоритетно вперёд, если выход перекрыт, пропускает предметы по бокам.
block.as-whitorite-inverted-gateway.name = Белоритовый избыточный шлюз
block.as-whitorite-inverted-gateway.description = Пропускает предметы приоритетно по бокам, если выход перекрыт, пропускает предметы вперёд.
block.as-whitorite-container.name = Белоритовый контейнер
block.as-whitorite-container.description = Хранит предметы, при необходимости может быть разгружен разгрузчиком. При установке рядом с ядром расширяет его хранилище.
block.as-whitorite-unloader.name = Белоритовый разгрузчик
block.as-whitorite-unloader.description = Разгружает предметы из поставленных в упор построек. Может распределять предметы между заводами или разгружать предметы из блоков хранилищ, а также ядра.
block.as-magnetite-conveyor.name = Магнетитовый конвейер
block.as-magnetite-conveyor.description = Перемещает предметы пачками и выгружает их в три стороны на конце.

 #Блоки жидкостной логистики
block.as-irmenite-conduit.name = Ирменитовый трубопровод
block.as-irmenite-conduit.description = Перемещает жидкости вперёд.
block.as-irmenite-router.name = Ирменитовый маршрутизатор
block.as-irmenite-router.description = Распределяет поток жидкости.
block.as-irmenite-junction.name = Ирменитовый перекрёсток
block.as-irmenite-junction.description = Позволяет двум перпендикулярным потокам жидкости пересекаться без их перемешивания.
block.as-irmenite-bridge.name = Ирменитовый мост
block.as-irmenite-bridge.description = Позволяет жидкостям пересекать непроходимую поверхность.
block.as-irmenite-pump.name = Ирменитовая помпа
block.as-irmenite-pump.description = Просто помпа. Перекачивает жидкости.
block.as-irmenite-tank.name = Ирменитовый бак
block.as-irmenite-tank.description = Хранит жидкости.

 #Блоки добычи
block.as-impulse-drill.name = Импульсный бур
block.as-impulse-drill.description = Бурит пачками предметов с постоянным интервалом.
block.as-rotary-drill.name = Роторный бур
block.as-rotary-drill.description = Бурит предметы в постоянном потоке. Требует метан, как топливо для бурения.
block.as-methane-extractor.name = Метановый экстрактор
block.as-methane-extractor.description = Выкачивает метан из жерл.
block.as-methane-extractor.details = Из-за создаюшегося вакума, выкачивает гораздо больше метана, чем использует жерловой сжигатель, из-за этого гораздо более целесообразнее использовать эту установку вместе с внешними генераторами сгорания.
block.as-zion-synthesizer.name = Синтезатор зиона
block.as-zion-synthesizer.description = Путем электролиза, отделяет зион от криолина, в качестве стимулятора реакции используется цинк.
block.as-magnetite-deep-drill.name = Глубинный бур магнетита
block.as-magnetite-deep-drill.description = Бурит магнетит из подземных кластеров. Необходимы метан и криолин для поддержания процесса бурения.

 #Блоки производства
block.as-irmenite-oven.name = Печь ирменита
block.as-irmenite-oven.description = Восстанавливает ирменит из кварца при помощи белорита.
block.as-irmenite-oven.details = Ключ к технологиям фракции [#d0d8e8]Орион.[]
block.as-ashotite-press.name = Пеплотитовый пресс
block.as-ashotite-press.description = Сжимает пепел из атмосферы вместе с метаном и кварцем для производства пеплотита.
block.as-blacktite-smelter.name = Плавильня чернита
block.as-blacktite-smelter.description = Использует принцип электрической дуги, для выплавления чернита.
block.as-zionitium-press.name = Пресс зионита
block.as-zionitium-press.description = Сжимает пирит, под воздействием зиона, тем самым получая зионитиум в процессе.

 #Блоки энергетики
block.as-vent-burner.name = Жерловой сжигатель
block.as-vent-burner.description = Собирает и сжигает весь метан, полученный из жерл, тем самым вырабатывая энергию.
block.as-whitorite-beam-node.name = Белоритовый лучевой узел
block.as-whitorite-beam-node.description = Распределяет энергию.
block.as-burn-generator.name = Генератор сгорания
block.as-burn-generator.description = Сжигает метан, для получения энергии.
block.as-burn-generator.details = В отличии от жерлогого сжигателя, использует больше метана в компактном размере для выработки большего количества энергии.

 #Блоки - фабрики юнитов
