 #Секторы
sector.as-entry-point.name = Точка входа
sector.as-entry-point.description = Ваше место высадки на этой планете. Здесь относительно малая активность здешних фракций, однако что-то живое тут явно есть.
sector.as-impact-point.name = Точка удара
sector.as-impact-point.description = Промежуточный сектор. Здесь вы не откроете каких-либо новых технологий, однако вы впервые здесь встретите вашего будущего противника.
sector.as-quartz-valley.name = Кварцевая долина
sector.as-quartz-valley.description = В этом секторе огромное содержание кварца. Также в этом секторе обнаружен аванпост фракции [#d0d8e8]Орион.[]
sector.as-gorge.name = Ущелье
sector.as-gorge.description = В этом секторе находится аванпост [#c75432]Пиро.[] Исследуйте базовые технологии фракции [#d0d8e8]Орион[] для захвата этого сектора.
sector.as-coast.name = Побережье
sector.as-coast.description = Прибрежный сектор к одному из криолиновых озёр. Здесь вы получите доступ к технологиям добычи жидкости и её хранения, однако замечена активность двух фракций одновременно, но высаживаться они будут из одной точки.

