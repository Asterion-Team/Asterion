 #Орион
unit.as-varan.name = Варан
unit.as-varan.description = Простой мех фракции [#d0d8e8]«Орион».[] Стреляет небольшими пучками плазмы.
unit.as-piranha.name = Пиранья
unit.as-piranha.description = Мех фракции [#d0d8e8]«Орион».[] Выпускает истощающие лучи с эффектом вампиризма.
unit.as-vulture.name = Стервятник
unit.as-vulture.description = Мех фракции [#d0d8e8]«Орион».[] Выпускает очереди, состоящие из пучков плазмы.
unit.as-scorpion.name = Скорпион
unit.as-scorpion.description = Мех фракции [#d0d8e8]«Орион».[] Выпускает пучки нестабильной плазмы, которая в процессе разлетается на более мелкие частицы.
unit.as-raptor.name = Хищник
unit.as-raptor.description = Массивный мех фракции [#d0d8e8]«Орион».[] Стреляет сгустком энергии, поражающей цели как в процессе полета, так и при разрыве.


