 turret.mode.basic = Базовый режим
fire.turret.mode.basic = Базовый режим стрельбы
turret.mode.artillery = Артиллерийский режим
turret.mode.artillery.description = Турель стреляет из двух стволов одновременно. Снаряды летят по навесной траектории.
fire.turret.mode.artillery = Артиллерийский режим стрельбы